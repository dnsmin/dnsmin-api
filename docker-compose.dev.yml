services:

  redis:
    image: redis:8.0.1
    container_name: dnsmin_redis
    hostname: redis
    restart: unless-stopped
    env_file: .env
    volumes:
      - redis:/data
    networks:
      - dnsmin
    healthcheck:
      test: [ 'CMD', 'redis-cli', '--raw', 'incr', 'ping' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s

  proxy:
    image: nginx:1.27
    container_name: dnsmin_proxy
    hostname: dnsmin_proxy
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./deploy/docker/nginx/certs:/etc/nginx/certs
      - ./deploy/docker/nginx/conf/proxy.conf.template:/etc/nginx/templates/default.conf.template
      - ./var/log/nginx:/var/log/nginx
    ports:
      - "${DNSMIN_SERVICE_IP}:80:80"
      - "${DNSMIN_SERVICE_IP}:443:443"
      - "${DNSMIN_SERVICE_IP}:5353:5353"
      - "${DNSMIN_SERVICE_IP}:5354:5354/udp"
    networks:
      - dnsmin
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://dnsmin_proxy:80' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s

  api:
    image: dnsmin/dnsmin-api:latest
    container_name: dnsmin_api
    hostname: dnsmin_api
    restart: unless-stopped
    command: python3 -m uvicorn --host 0.0.0.0 --port 8081 --root-path / --log-level debug --access-log --proxy-headers --reload api:app
    build:
      context: .
      dockerfile: ./deploy/docker/api/Dockerfile
    depends_on:
      - redis
    env_file: .env
    volumes:
      - ./config:/srv/app/config
    networks:
      - dnsmin
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://dnsmin_api:8081/api/status' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s

  worker:
    image: dnsmin/dnsmin-api:latest
    container_name: dnsmin_worker
    hostname: dnsmin_worker
    restart: unless-stopped
    command: python3 -m celery -A worker.app worker --beat --loglevel debug
    build:
      context: .
      dockerfile: ./deploy/docker/api/Dockerfile
    depends_on:
      - redis
    env_file: .env
    volumes:
      - ./config:/srv/app/config
    networks:
      - dnsmin
    healthcheck:
      test: [ 'CMD-SHELL', 'celery', '-A', 'worker.app', 'inspect', 'ping', '--destination', 'celery@$$HOSTNAME' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s
    stop_signal: SIGTERM
    stop_grace_period: 900s

  receiver:
    image: dnsmin/dnsmin-receiver:latest
    container_name: dnsmin_receiver
    hostname: dnsmin_receiver
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./deploy/docker/receiver/Dockerfile
    depends_on:
      - redis
    env_file: .env
    volumes:
      - ./config:/srv/app/config
    networks:
      - dnsmin
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://dnsmin_receiver:8000/health' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s
    stop_signal: SIGTERM
    stop_grace_period: 900s

  web:
    image: dnsmin/dnsmin-web:latest
    restart: unless-stopped
    container_name: dnsmin_web
    hostname: dnsmin_web
    build:
      context: ./
      dockerfile: ./deploy/docker/web/Dockerfile
    env_file: .env
    volumes:
      - ./src-ui:/srv/app
      - ./deploy/docker/nginx/conf/web.conf:/etc/nginx/sites-enabled/default.conf
      - ./var/log/nginx:/var/log/nginx
    networks:
      - dnsmin
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://dnsmin_web:8000' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s

volumes:
  redis:

networks:
 dnsmin:
    external: false
    name: dnsmin