services:

  redis:
    image: redis/redis-stack:latest
    container_name: dnsmin_redis
    hostname: dnsmin_redis
    restart: unless-stopped
    env_file: .env
    volumes:
      - redis:/data
    ports:
      - "${DNSMIN_SERVICE_IP}:6379:6379"
      - "${DNSMIN_SERVICE_IP}:8002:8001"
    healthcheck:
      test: [ 'CMD', 'redis-cli', '--raw', 'incr', 'ping' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s

  api:
    image: dnsmin/dnsmin-api:latest
    container_name: dnsmin_api
    hostname: dnsmin_api
    restart: unless-stopped
    command: python3 -m uvicorn --host 0.0.0.0 --port 8000 --root-path / --log-level debug --access-log --proxy-headers --reload dnsmin.api:app
    build:
      context: .
      dockerfile: ./deploy/docker/api/Dockerfile
    depends_on:
      - redis
    env_file: .env
    volumes:
      - ./src:/srv/app/src
      - ./config:/srv/app/config
    ports:
      - "${DNSMIN_SERVICE_IP}:8000:8000"
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://dnsmin_api:8000/api/status' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s

  task_worker:
    image: dnsmin/dnsmin-api:latest
    container_name: dnsmin_task_worker
    hostname: dnsmin_task_worker
    restart: unless-stopped
    command: python3 -m celery -A dnsmin.worker.app worker --beat --loglevel debug
    build:
      context: .
      dockerfile: ./deploy/docker/api/Dockerfile
    depends_on:
      - redis
    env_file: .env
    volumes:
      - ./src:/srv/app/src
      - ./config:/srv/app/config
    healthcheck:
      test: [ 'CMD-SHELL', 'celery', '-A', 'worker.app', 'inspect', 'ping', '--destination', 'celery@$$HOSTNAME' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s
    stop_signal: SIGTERM
    stop_grace_period: 900s

  async_worker:
    image: dnsmin/dnsmin-api:latest
    container_name: dnsmin_sync_worker
    hostname: dnsmin_sync_worker
    restart: unless-stopped
    command: python3 src/dnsmin/async_worker.py
    build:
      context: .
      dockerfile: ./deploy/docker/api/Dockerfile
    depends_on:
      - redis
    env_file: .env
    volumes:
      - ./src:/srv/app/src
      - ./config:/srv/app/config

  receiver:
    image: dnsmin/dnsmin-receiver:latest
    container_name: dnsmin_receiver
    hostname: dnsmin_receiver
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./deploy/docker/receiver/Dockerfile
    depends_on:
      - redis
    env_file: .env
    volumes:
      - ./config:/srv/app/config
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://dnsmin_receiver:8000/health' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s
    stop_signal: SIGTERM
    stop_grace_period: 900s

volumes:
  redis:
